name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Read Gerrit branch
        id: gerrit
        run: echo "branch=$(cat plugin/GERRIT_VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Checkout Gerrit
        uses: actions/checkout@v4
        with:
          repository: GerritCodeReview/gerrit
          ref: ${{ steps.gerrit.outputs.branch }}
          path: gerrit
          filter: blob:none

      - name: Initialize Gerrit submodules
        run: git -C gerrit submodule update --init --depth 1 -- modules/jgit modules/java-prettify

      - name: Place plugin in Gerrit tree
        run: |
          mv plugin gerrit/plugins/reviewtarget
          python3 - <<'EOF'
          import re
          path = 'gerrit/tools/bzl/plugins.bzl'
          content = open(path).read()
          content = re.sub(
              r'(CUSTOM_PLUGINS\s*=\s*\[)',
              r'\1\n    "reviewtarget",',
              content)
          open(path, 'w').write(content)
          EOF

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ steps.gerrit.outputs.branch }}-${{ hashFiles('gerrit/WORKSPACE', 'gerrit/plugins/reviewtarget/BUILD', 'gerrit/plugins/reviewtarget/ui/BUILD') }}
          restore-keys: |
            ${{ runner.os }}-bazel-${{ steps.gerrit.outputs.branch }}-
            ${{ runner.os }}-bazel-

      - name: Build
        working-directory: gerrit
        run: bazel build //plugins/reviewtarget:reviewtarget

      - name: Java tests
        working-directory: gerrit
        run: bazel test //plugins/reviewtarget:reviewtarget_tests --test_output=errors

      - name: Install Playwright Chromium
        run: npx --yes playwright install chromium --with-deps

      - name: UI tests
        working-directory: gerrit
        run: bazel test //plugins/reviewtarget/ui:web_test_runner

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gerrit/bazel-bin/plugins/reviewtarget/reviewtarget.jar
          generate_release_notes: true
